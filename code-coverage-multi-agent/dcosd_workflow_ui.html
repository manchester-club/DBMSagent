<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent 执行流程</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background-color: #0a0e27;
            color: #e8e8e8;
            line-height: 1.6;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            padding: 20px 30px;
            background: linear-gradient(135deg, #1a1f3a 0%, #0a0e27 100%);
            border-bottom: 1px solid #1a1f3a;
        }

        .header h1 {
            color: #e8e8e8;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header .subtitle {
            color: #8c8c8c;
            font-size: 14px;
        }

        .main-content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #1a1f3a;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background-color: #0a0e27;
        }

        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            display: flex;
            justify-content: flex-end;
        }

        .message.assistant {
            display: flex;
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 8px;
            word-wrap: break-word;
        }

        .message.user .message-bubble {
            background-color: #1890ff;
            color: #fff;
        }

        .message.assistant .message-bubble {
            background-color: #141829;
            border: 1px solid #1a1f3a;
            color: #e8e8e8;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 12px;
            color: #8c8c8c;
        }

        .message-content {
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .tool-call {
            background-color: #0a0e27;
            border: 1px solid #1a1f3a;
            border-radius: 6px;
            padding: 12px;
            margin-top: 8px;
        }

        .tool-name {
            color: #faad14;
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .tool-param {
            color: #8c8c8c;
            font-size: 12px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            margin: 4px 0;
        }

        .tool-result {
            color: #52c41a;
            font-size: 12px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #1a1f3a;
        }

        .dispatch-message {
            background-color: #1a2332;
            border-left: 3px solid #1890ff;
            padding: 12px 16px;
            border-radius: 4px;
            margin: 12px 0;
        }

        .dispatch-message .agent {
            color: #1890ff;
            font-weight: 600;
            font-size: 13px;
        }

        .input-panel {
            padding: 16px 20px;
            background-color: #0a0e27;
            border-top: 1px solid #1a1f3a;
        }

        .input-container {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-textarea {
            flex: 1;
            background-color: #141829;
            border: 1px solid #1a1f3a;
            border-radius: 6px;
            padding: 12px;
            color: #e8e8e8;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            min-height: 50px;
            max-height: 150px;
        }

        .input-textarea:focus {
            outline: none;
            border-color: #1890ff;
        }

        .input-textarea::placeholder {
            color: #8c8c8c;
        }

        .send-button {
            background-color: #1890ff;
            border: none;
            border-radius: 6px;
            padding: 12px 24px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .send-button:hover:not(:disabled) {
            background-color: #40a9ff;
        }

        .send-button:disabled {
            background-color: #1a1f3a;
            color: #8c8c8c;
            cursor: not-allowed;
        }

        .quick-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .quick-button {
            background-color: transparent;
            border: 1px solid #1a1f3a;
            border-radius: 4px;
            padding: 6px 12px;
            color: #8c8c8c;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-button:hover {
            border-color: #1890ff;
            color: #1890ff;
        }

        .sidebar {
            width: 400px;
            display: flex;
            flex-direction: column;
            background-color: #141829;
            border-left: 1px solid #1a1f3a;
            overflow-y: auto;
        }

        .sidebar-section {
            padding: 20px;
            border-bottom: 1px solid #1a1f3a;
        }

        .sidebar-section h3 {
            color: #e8e8e8;
            font-size: 16px;
            margin-bottom: 16px;
        }

        .function-info {
            background-color: #0a0e27;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #1a1f3a;
        }

        .function-info .label {
            color: #8c8c8c;
            font-size: 11px;
            margin-bottom: 4px;
        }

        .function-info .value {
            color: #e8e8e8;
            font-size: 13px;
            font-weight: 600;
        }

        .coverage-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 6px;
        }

        .coverage-badge.initial {
            background-color: #faad14;
            color: #fff;
        }

        .coverage-badge.final {
            background-color: #52c41a;
            color: #fff;
        }

        .step-card {
            background-color: #0a0e27;
            border: 1px solid #1a1f3a;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
        }

        .step-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .step-card.active {
            border-color: #1890ff;
            box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.2);
        }

        .step-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .step-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            background-color: #1890ff;
            color: #fff;
            border-radius: 50%;
            font-weight: 600;
            font-size: 12px;
        }

        .step-title {
            color: #e8e8e8;
            font-size: 13px;
            font-weight: 600;
        }

        .agent-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            background-color: #1a2332;
            color: #1890ff;
            border: 1px solid #1890ff;
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .status-indicator.pending {
            background-color: #8c8c8c;
        }

        .status-indicator.running {
            background-color: #faad14;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .status-indicator.completed {
            background-color: #52c41a;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .typing-indicator {
            display: inline-block;
            color: #8c8c8c;
            font-size: 12px;
            font-style: italic;
        }

        .typing-dots {
            display: inline-block;
        }

        .typing-dots span {
            animation: typing 1.4s infinite;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.3;
            }
            30% {
                opacity: 1;
            }
        }

        .code-block {
            background-color: #0a0e27;
            border: 1px solid #1a1f3a;
            border-radius: 4px;
            padding: 12px;
            margin-top: 8px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            overflow-x: auto;
        }

        .code-line {
            display: block;
            padding: 2px 0;
        }

        .code-line.covered {
            color: #52c41a;
        }

        .code-line.uncovered {
            color: #ff4d4f;
            background-color: rgba(255, 77, 79, 0.1);
            padding: 2px 8px;
            border-left: 3px solid #ff4d4f;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background-color: #1a1f3a;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 12px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #1890ff 0%, #52c41a 100%);
            transition: width 0.3s ease;
        }
    </style>
</head>

        <div class="main-content">

                <div class="input-panel">

                </div>

                <div class="sidebar-section">
                    <h3>🔄 执行步骤</h3>
                    <div id="stepsContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <script>

                    await addMessage('assistant', step.agentReply, null, 300);
                    await new Promise(resolve => setTimeout(resolve, 1500));
                } else if (step.result) {
                    await addMessage('assistant', `${step.result.message}\n${step.result.summary || ''}`, null, 300);
                    await new Promise(resolve => setTimeout(resolve, 1500));
                }

                // 更新测试目标信息
                if (step.toolCall && step.toolCall.result && typeof step.toolCall.result.coverage === 'number') {
                    const result = step.toolCall.result;
                    updateTargetInfo(result);
                }

                // 阶段分隔
                if (i === 3) {
                    await new Promise(resolve => setTimeout(resolve, 1000));
                }


                // 等待指定时间（如果设置了）
                if (step.delay) {
                    await new Promise(resolve => setTimeout(resolve, step.delay));
                }
            }

            // 执行完成
            isExecuting = false;
            document.getElementById('sendButton').disabled = false;
            await addMessage('assistant', `\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n✅ **执行完成！**\n\n📊 **最终结果：**\n• 初始覆盖率：80.0% (16/20行)\n• 最终覆盖率：95.0% (19/20行)\n• 覆盖率提升：+15.0% (+3行)\n• 未覆盖行：第2356行（溢出错误处理）\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`, null, 500);
        }

        // 更新步骤显示
        function updateStepsDisplay() {
            const container = document.getElementById('stepsContainer');
            container.innerHTML = '';

            workflowSteps.forEach((step, index) => {
                const stepDiv = document.createElement('div');
                stepDiv.className = `step-card ${index < currentStep ? 'visible' : ''} ${index === currentStep - 1 ? 'active' : ''}`;
                
                let statusIcon = '';
                if (index < currentStep - 1) {
                    statusIcon = '<span class="status-indicator completed"></span>';
                } else if (index === currentStep - 1) {
                    statusIcon = '<span class="status-indicator running"></span>';
                } else {
                    statusIcon = '<span class="status-indicator pending"></span>';
                }

                stepDiv.innerHTML = `
                    <div class="step-header">
                        ${statusIcon}
                        <span class="step-number">${step.step}</span>
                        <span class="step-title">${step.title}</span>
                        <span class="agent-badge">${step.agent}</span>
                    </div>
                `;
                container.appendChild(stepDiv);
            });
        }

        // 更新测试目标信息
        function updateTargetInfo(coverageResult) {
            if (coverageResult.function_name) {
                document.getElementById('targetFunctionName').textContent = coverageResult.function_name;
            }
            if (coverageResult.file_path) {
                document.getElementById('targetFilePath').textContent = coverageResult.file_path;
            }
            if (coverageResult.coverage !== undefined) {
                const coverageText = `${coverageResult.coverage}% (${coverageResult.covered_lines}/${coverageResult.total_lines}行)`;
                if (document.getElementById('targetInitialCoverage').textContent === '-') {
                    document.getElementById('targetInitialCoverage').innerHTML = coverageText + ' <span class="coverage-badge initial">初始</span>';
                }
                document.getElementById('targetCurrentCoverage').innerHTML = coverageText + ' <span class="coverage-badge final">当前</span>';
            }
        }

        // 初始化
        init();
    </script>
</body>
</html>
